<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة خطوبة عمر & روان 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<!-- مكتبة Confetti للاحتفال 🎉 -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background: radial-gradient(circle at center, #fffcf5 0%, #f3e5c8 100%);
overflow-x:hidden;
min-height:100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
position: relative;
}

.container{
width: 100%;
max-width:700px;
padding:20px;
text-align:center;
z-index: 10;
}

/* 💌 الشاشة الافتتاحية والظرف الفاخر */
.welcome-header {
margin-bottom: 25px;
animation: fadeInDown 1s ease;
}

.welcome-header h2 {
font-family: 'Amiri', serif;
color: #8a692b;
font-size: 28px;
margin-bottom: 5px;
}

.welcome-header p {
color: #b7862d;
font-size: 15px;
letter-spacing: 0.5px;
}

.envelope-wrapper {
position: relative;
width: 280px;
height: 190px;
margin: 20px auto;
perspective: 1000px;
cursor: pointer;
}

.envelope {
position: relative;
width: 100%;
height: 100%;
background: #d4b06a;
border-radius: 12px;
box-shadow: 0 15px 35px rgba(138, 105, 43, 0.25), 0 0 20px rgba(212, 175, 55, 0.2);
transform-style: preserve-3d;
transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.envelope::before {
content: '';
position: absolute;
top: 0; left: 0; width: 0; height: 0;
border-left: 140px solid #c49d53;
border-right: 140px solid #c49d53;
border-bottom: 100px solid transparent;
border-top: 95px solid transparent;
border-radius: 12px;
z-index: 3;
pointer-events: none;
}

.envelope::after {
content: '';
position: absolute;
bottom: 0; left: 0; width: 0; height: 0;
border-left: 140px solid #cca45b;
border-right: 140px solid #cca45b;
border-top: 95px solid transparent;
border-radius: 0 0 12px 12px;
z-index: 3;
pointer-events: none;
}

.flap {
position: absolute;
top: 0; left: 0;
width: 0; height: 0;
border-left: 140px solid transparent;
border-right: 140px solid transparent;
border-top: 110px solid #b3883b;
transform-origin: top;
transition: transform 0.8s ease 0.2s, z-index 0.2s ease 0.4s;
z-index: 4;
}

/* 🕯️ الختم الشمعي الفاخر */
.wax-seal {
position: absolute;
top: 85px;
left: 50%;
transform: translateX(-50%);
width: 55px;
height: 55px;
background: radial-gradient(circle, #b7862d 0%, #8a692b 100%);
border-radius: 50%;
display: flex;
justify-content: center;
align-items: center;
color: #fff;
font-family: 'Amiri', serif;
font-weight: bold;
font-size: 18px;
box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 0 5px rgba(255,255,255,0.4);
border: 2px solid #dfba6d;
z-index: 5;
transition: transform 0.3s ease, box-shadow 0.3s ease;
animation: pulseSeal 2s infinite alternate;
}

@keyframes pulseSeal {
0% { transform: translateX(-50%) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 0 0 rgba(212, 175, 55, 0.4); }
100% { transform: translateX(-50%) scale(1.08); box-shadow: 0 6px 15px rgba(0,0,0,0.4), 0 0 0 12px rgba(212, 175, 55, 0); }
}

.paper {
position: absolute;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
width: 90%;
height: 85%;
background: #ffffff;
border-radius: 8px;
padding: 15px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
color: #8a692b;
font-weight: bold;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
z-index: 2;
}

/* 🔓 أنيميشن الفتح */
.open .flap {
transform: rotateX(180deg);
z-index: 1;
}

.open .wax-seal {
opacity: 0;
pointer-events: none;
}

.open .paper {
transform: translateX(-50%) translateY(-100px);
z-index: 4;
}

.click-hint {
margin-top: 30px;
display: inline-block;
padding: 10px 24px;
background: rgba(183, 134, 45, 0.12);
border: 1px dashed #b7862d;
border-radius: 30px;
color: #8a692b;
font-size: 15px;
font-weight: 600;
animation: bounceHint 2s infinite;
}

@keyframes bounceHint {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-5px); }
}

/* 📜 شاشة الدعوة */
#invite{
display:none;
animation:fade .9s ease-in-out;
}

@keyframes fade{
from{ opacity:0; transform:translateY(30px); }
to{ opacity:1; transform:none; }
}

@keyframes fadeInDown {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}

/* 📷 الصورة مع توهج فاخر وإطار مذهب */
.img-container {
position: relative;
display: inline-block;
width: 100%;
margin-top: 10px;
}

img{
width:100%;
border-radius:20px;
box-shadow:0 15px 40px rgba(138, 105, 43, 0.25);
border: 2px solid rgba(212, 175, 55, 0.5);
transition: transform 0.4s ease;
}

.btn{
display:inline-block;
margin-top:25px;
padding:16px 35px;
background:linear-gradient(135deg, #b7862d, #8a692b);
color:white;
text-decoration:none;
border-radius:50px;
font-size:19px;
font-weight: bold;
transition:.3s;
box-shadow: 0 8px 20px rgba(183, 134, 45, 0.3);
}

.btn:hover{
transform:scale(1.05);
box-shadow: 0 12px 25px rgba(183, 134, 45, 0.5);
}

.quote{
margin:25px 0;
font-family: 'Amiri', serif;
font-size:26px;
color:#8a692b;
line-height:1.8;
}

footer{
margin-top:35px;
color:#7b6027;
font-size:18px;
font-weight: 600;
}

/* 🌹 بتلات الورد المتساقطة فوق الصفحة والصورة */
.petal {
position: fixed;
top: -10%;
font-size: 20px;
user-select: none;
pointer-events: none;
z-index: 100;
animation: petalFall linear infinite;
}

@keyframes petalFall {
0% {
    transform: translateY(0) rotate(0deg) translateX(0);
    opacity: 0.9;
}
50% {
    transform: translateY(50vh) rotate(180deg) translateX(25px);
}
100% {
    transform: translateY(105vh) rotate(360deg) translateX(-25px);
    opacity: 0;
}
}

@media (max-width: 480px) {
.envelope-wrapper { width: 250px; height: 170px; }
.envelope::before, .envelope::after { border-left-width: 125px; border-right-width: 125px; }
.flap { border-left-width: 125px; border-right-width: 125px; }
.quote { font-size: 22px; }
}
</style>
</head>

<body>

<!-- 💌 الشاشة الافتتاحية -->
<div id="env" class="container">
    <div class="welcome-header">
        <h2>دعوة خاصة لك</h2>
        <p>تشرفنا مشاركتكم فرحتنا</p>
    </div>

    <div class="envelope-wrapper" onclick="openInvite()">
        <div class="envelope" id="envelopeObj">
            <div class="flap"></div>
            <div class="wax-seal">O&R</div>
            <div class="paper">
                <span style="font-size: 24px;">💍</span>
                <span style="font-family:'Amiri', serif; font-size:20px; margin-top:5px;">عمر & روان</span>
            </div>
        </div>
    </div>

    <div class="click-hint">
        ✨ اضغط على الختم لفتح الدعوة ✨
    </div>
</div>

<!-- 💍 شاشة الدعوة الأصلية -->
<div id="invite" class="container">
    <h1 style="color:#8a692b;font-size:38px;font-family:'Amiri', serif; margin-bottom: 10px;">
        💍 عمر & روان
    </h1>

    <div class="quote">
        فكانَ لقاؤكِ أجملَ صُدفةٍ،<br>
        وكانَ اختيارُ اللهِ أجملَ قَدَر.
    </div>

    <div class="img-container">
        <img src="https://i.ibb.co/Fbp72Lt7/Whats-App-Image-2026-07-23-at-10-48-43-AM.jpg" alt="دعوة خطوبة عمر وروان">
    </div>

    <a class="btn" target="_blank" href="https://maps.app.goo.gl/ztxyGY8H2dyTcrB16">
        📍 فتح موقع القاعة
    </a>

    <footer>
        ننتظر حضوركم ليكتمل فرحنا بوجودكم ❤️
    </footer>
</div>

<script>
// 🌹 إنشاء بتلات الورد المتساقطة
const petals = ['🌸', '🌺', '🌹', '🍃'];
for(let i = 0; i < 35; i++) {
    let p = document.createElement("div");
    p.className = "petal";
    p.innerHTML = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 7) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    p.style.fontSize = (16 + Math.random() * 12) + "px";
    document.body.appendChild(p);
}

function openInvite(){
    const env = document.getElementById("envelopeObj");
    if(env.classList.contains("open")) return;
    
    env.classList.add("open");

    setTimeout(()=>{
        // فرقعات احتفالية 🎉
        confetti({
            particleCount: 120,
            spread: 85,
            origin: { y: 0.6 },
            colors: ['#d4af37', '#ffffff', '#caa14b', '#e8b4b8']
        });

        document.getElementById("env").style.display="none";
        document.getElementById("invite").style.display="block";
        window.scrollTo({top:0,behavior:'smooth'});
    }, 1200);
}
</script>

</body>
</html>
